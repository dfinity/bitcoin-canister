name: Publish crates to crates.io

on:
  workflow_dispatch

# Publishes crates managed by release-plz (ic-btc-interface, ic-cdk-bitcoin-canister) to crates.io.
# Run this after merging the release PR created by release-plz.

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write # Required for OIDC token exchange

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1

      - name: Publish crates (release-plz)
        uses: release-plz/action@5ab144c9d67d4346240190d0f95ed08668677928 # v0.5.121
        with:
          command: release
          version: 0.3.151
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
